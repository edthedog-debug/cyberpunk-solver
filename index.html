<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITECH - Protocolo de Invasión</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --cyber-yellow: #dbde21;
            --cyber-blue: #3292b3;
            --cyber-dark: #070e14;
            --cyber-box: #13242c;
        }
        body {
            background-color: var(--cyber-dark);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-title {
            color: var(--cyber-yellow);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 5px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .timer-block {
            border: 2px solid var(--cyber-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background: rgba(219, 222, 33, 0.05);
            margin-bottom: 15px;
        }
        .timer-title {
            color: var(--cyber-yellow);
            font-size: 16px;
            font-weight: bold;
        }
        .timer-value {
            border: 1px solid var(--cyber-yellow);
            padding: 2px 10px;
            color: var(--cyber-yellow);
            font-weight: bold;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid var(--cyber-blue);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .camera-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px dashed rgba(0, 240, 255, 0.3);
            pointer-events: none;
            box-sizing: border-box;
        }
        .btn {
            background-color: var(--cyber-yellow);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-upload {
            background-color: #1f3a47;
            color: var(--cyber-blue);
            border: 1px solid var(--cyber-blue);
        }
        .btn-solve {
            background-color: var(--cyber-blue);
            color: #fff;
            margin-top: 15px;
        }
        #ocr-status {
            font-size: 12px;
            color: var(--cyber-yellow);
            text-align: center;
            margin-bottom: 15px;
        }
        .game-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        @media(max-width: 480px) {
            .game-layout { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--cyber-box);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 10px;
        }
        .panel-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .matrix-title { color: var(--cyber-yellow); }
        .sequence-title { color: var(--cyber-blue); }

        textarea {
            width: 100%;
            background: #020608;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            box-sizing: border-box;
            padding: 8px;
            font-family: monospace;
            font-size: 15px;
            resize: vertical;
        }
        #matrix-input { height: 140px; letter-spacing: 3px; }
        #sequences-input { height: 140px; letter-spacing: 2px; }

        .buffer-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .buffer-section input {
            background: #000; color: #fff; border: 1px solid var(--cyber-blue);
            padding: 5px; width: 50px; text-align: center;
        }
        #result {
            border: 1px solid var(--cyber-yellow);
            padding: 15px;
            background: rgba(219, 222, 33, 0.02);
            margin-top: 10px;
        }
        .solution-line {
            font-size: 16px;
            color: var(--cyber-yellow);
            margin: 8px 0;
        }
        /* Ocultar el input file nativo feo */
        #file-input {
            display: none;
        }
    </style>
</head>
<body>

    <div class="header-title">MILITECH COUPLER V7.3 [FOTO_INPUT_ADDED]</div>
    
    <div class="container">
        <div class="timer-block">
