<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITECH - Breach Protocol Pro v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --cyber-yellow: #dbde21;
            --cyber-blue: #3292b3;
            --cyber-dark: #070e14;
            --cyber-box: #13242c;
        }
        body {
            background-color: var(--cyber-dark);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-title {
            color: var(--cyber-yellow);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 5px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .timer-block {
            border: 2px solid var(--cyber-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background: rgba(219, 222, 33, 0.05);
            margin-bottom: 15px;
        }
        .timer-title {
            color: var(--cyber-yellow);
            font-size: 16px;
            font-weight: bold;
        }
        .timer-value {
            border: 1px solid var(--cyber-yellow);
            padding: 2px 10px;
            color: var(--cyber-yellow);
            font-weight: bold;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid var(--cyber-blue);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .camera-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px dashed rgba(0, 240, 255, 0.4);
            pointer-events: none;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .btn {
            background-color: var(--cyber-yellow);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-camera {
            background-color: #a42121;
            color: #fff;
            border: 1px solid #ff4a4a;
        }
        .btn-upload {
            background-color: #1f3a47;
            color: var(--cyber-blue);
            border: 1px solid var(--cyber-blue);
        }
        .btn-solve {
            background-color: var(--cyber-blue);
            color: #fff;
            margin-top: 15px;
        }
        #ocr-status {
            font-size: 12px;
            color: var(--cyber-yellow);
            text-align: center;
            margin-bottom: 15px;
            padding: 5px;
            background: rgba(219, 222, 33, 0.1);
            border-radius: 3px;
        }
        .game-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        @media(max-width: 480px) {
            .game-layout { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--cyber-box);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 10px;
        }
        .panel-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .matrix-title { color: var(--cyber-yellow); }
        .sequence-title { color: var(--cyber-blue); }

        textarea {
            width: 100%;
            background: #020608;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            box-sizing: border-box;
            padding: 8px;
            font-family: monospace;
            font-size: 15px;
            resize: vertical;
        }
        #matrix-input { height: 140px; letter-spacing: 3px; }
        #sequences-input { height: 140px; letter-spacing: 2px; }

        .buffer-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .buffer-section input {
            background: #000; color: #fff; border: 1px solid var(--cyber-blue);
            padding: 5px; width: 50px; text-align: center;
        }
        #result {
            border: 1px solid var(--cyber-yellow);
            padding: 15px;
            background: rgba(219, 222, 33, 0.02);
            margin-top: 10px;
        }
        .solution-line {
            font-size: 16px;
            color: var(--cyber-yellow);
            margin: 8px 0;
        }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="header-title">MILITECH COUPLER V3.0 [HARDWARE CORE UPDATED]</div>
    
    <div class="container">
        <div class="timer-block">
            <div class="timer-title">BREACH TIME REMAINING</div>
            <div class="timer-value">30.00</div>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline muted></video>
            <div class="camera-overlay"></div>
        </div>
        
        <button class="btn btn-camera" id="btn-init-camera">1. Activate Rear Camera</button>
        <button class="btn" id="btn-capture">2. Capture and Scan Screen</button>
        
        <label for="file-input" class="btn btn-upload">Upload Photo from Gallery</label>
        <input type="file" id="file-input" accept="image/*">

        <div id="ocr-status">System ready. Start the camera or upload an image from your gallery.</div>

        <div class="game-layout">
            <div class="panel">
                <div class="panel-title matrix-title">▰ CODE MATRIX</div>
                <textarea id="matrix-input" placeholder="Matrix data will appear here..."></textarea>
            </div>
            <div class="panel">
                <div class="panel-title sequence-title">▰ SEQUENCE REQUIRED</div>
                <textarea id="sequences-input" placeholder="Required sequences will appear here..."></textarea>
            </div>
        </div>

        <div class="buffer-section">
            <span>BUFFER SIZE [BUFFER]:</span>
            <input type="number" id="buffer-size" value="7" min="4" max="8">
        </div>

        <button class="btn btn-solve" id="btn-solve">Calculate Optimal Breach Path</button>

        <div id="result">
            <div class="panel-title" style="color: var(--cyber-yellow)">Resulting Hacking Path:</div>
            <div id="solution-output">Awaiting data initialization...</div>
        </div>
    </div>

    <canvas id="hidden-canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const btnInitCamera = document.getElementById('btn-init-camera');
        const btnCapture = document.getElementById('btn-capture');
        const fileInput = document.getElementById('file-input');
        const btnSolve = document.getElementById('btn-solve');
        const ocrStatus = document.getElementById('ocr-status');
        const matrixInput = document.getElementById('matrix-input');
        const sequencesInput = document.getElementById('sequences-input');
        const hiddenCanvas = document.getElementById('hidden-canvas');

        // Camera Activation Action
        btnInitCamera.addEventListener('click', () => {
            ocrStatus.innerText = "Requesting access to the rear camera...";
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            }).then(stream => {
                video.srcObject = stream;
                video.play();
                btnInitCamera.style.backgroundColor = "#21a440";
                btnInitCamera.style.border = "1px solid #4aff72";
                btnInitCamera.innerText = "✓ Camera Connected";
                ocrStatus.innerText = "Camera ready. Frame the matrix cleanly and tap 'Capture and Scan Screen'.";
            }).catch((err) => {
                console.error(err);
                navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                    video.srcObject = stream;
                    video.play();
                    ocrStatus.innerText = "Generic camera initialized.";
                }).catch(cameraErr => {
                    ocrStatus.innerText = "Camera access denied. Check system privacy settings.";
                });
            });
        });

        // Capture Execution
        btnCapture.addEventListener('click', () => {
            if (!video.srcObject) {
                ocrStatus.innerText = "Error: You must first click 'Activate Rear Camera'.";
                return;
            }
            preprocessAndScan(video);
        });

        // Gallery Upload Execution
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            ocrStatus.innerText = "Loading gallery item...";
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    preprocessAndScan(img);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // HIGH-CONTRAST DIGITAL IMAGE FILTERING (CRITICAL FOR TELEVISION REFLECTIONS)
        function preprocessAndScan(sourceElement) {
            const ctx = hiddenCanvas.getContext('2d');
            
            let w = sourceElement.videoWidth || sourceElement.width || 800;
            let h = sourceElement.videoHeight || sourceElement.height || 600;
            
            hiddenCanvas.width = w;
            hiddenCanvas.height = h;
            ctx.drawImage(sourceElement, 0, 0, w, h);

            // Fetch image pixels to forcefully overwrite shadows and glares
            let imgData = ctx.getImageData(0, 0, w, h);
            let data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];

                // Convert pixel to gray brightness scale
                let brightness = 0.34 * r + 0.5 * g + 0.16 * b;

                // Threshold filter: convert soft/dark reflections to pure black, and neon text to glowing white
                let v = (brightness > 110) ? 255 : 0; 
                
                data[i] = v;     // R
                data[i+1] = v;   // G
                data[i+2] = v;   // B
            }
            
            ctx.putImageData(imgData, 0, 0);
            processImageOCR(hiddenCanvas.toDataURL('image/jpeg'));
        }

        // Fuzzy Match String Normalization Engine
        function correctCyberpunkToken(rawText) {
            let clean = rawText.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (clean === '55' || clean === 'SS' || clean === '5S' || clean === 'S5') return '55';
            if (['BD', '8D', 'B0', '80', '3D', '8B', '6D', 'ED'].includes(clean)) return 'BD';
            if (['1C', 'IC', '10', 'LC', 'L0', 'TC', 'C1', 'IO'].includes(clean)) return '1C';
            if (['7A', '74', 'TA', '4A', 'YA', '7A'].includes(clean)) return '7A';
            if (['E9', 'E8', 'E3', '69', 'B9', 'EB', 'ES', 'ED9', 'E99'].includes(clean)) return 'E9';
            
            if (clean.includes('55')) return '55';
            if (clean.includes('BD')) return 'BD';
            if (clean.includes('1C')) return '1C';
            if (clean.includes('7A')) return '7A';
            if (clean.includes('E9')) return 'E9';
            return null;
        }

        // PARSING AND LAYOUT RE-CONSTRUCTION ENGINE
        async function processImageOCR(base64Image) {
            ocrStatus.innerText = "Analyzing filtered binary matrix channels...";
            
            // Safety clear out to prevent interface lock-ups
            matrixInput.value = "";
            sequencesInput.value = "";

            try {
                const { data } = await Tesseract.recognize(base64Image, 'eng');
                let tokens = [];
                let totalHeight = 0;

                data.words.forEach(word => {
                    let correctedToken = correctCyberpunkToken(word.text);
                    if (correctedToken) {
                        let cx = word.bbox.x0 + (word.bbox.x1 - word.bbox.x0) / 2;
                        let cy = word.bbox.y0 + (word.bbox.y1 - word.bbox.y0) / 2;
                        let h = word.bbox.y1 - word.bbox.y0;
                        tokens.push({ text: correctedToken, x: cx, y: cy, h: h });
                        totalHeight += h;
                    }
                });

                if (tokens.length === 0) {
                    ocrStatus.innerText = "Scan failed: No hex sequences recognized. Ensure the camera lens is clean and parallel.";
                    return;
                }

                let avgH = totalHeight / tokens.length;
                let rowRange = avgH * 1.3; // Increased height elastic ceiling to fix perspective tilts

                // 1. Cluster nodes into individual rows matching vertical proximity
                let groupedRows = [];
                tokens.forEach(t => {
                    let assigned = false;
                    for (let row of groupedRows) {
                        let avgYRow = row.reduce((sum, item) => sum + item.y, 0) / row.length;
                        if (Math.abs(t.y - avgYRow) < rowRange) {
                            row.push(t);
                            assigned = true;
                            break;
                        }
                    }
                    if (!assigned) groupedRows.push([t]);
                });

                // Top-to-bottom structural sort
                groupedRows.sort((a, b) => {
                    let ay = a.reduce((sum, item) => sum + item.y, 0) / a.length;
                    let by = b.reduce((sum, item) => sum + item.y, 0) / b.length;
                    return ay - by;
                });

                let matrixLines = [];
                let sequenceLines = [];

                // 2. Absolute Quadrant Assignment (Safeguard against central shadows)
                let imgWidths = tokens.map(t => t.x);
                let minX = Math.min(...imgWidths);
                let maxX = Math.max(...imgWidths);
                let functionalDividerX = minX + (maxX - minX) * 0.58; 

                groupedRows.forEach(row => {
                    row.sort((a, b) => a.x - b.x);
                    
                    let leftSide = row.filter(t => t.x < functionalDividerX).map(t => t.text);
                    let rightSide = row.filter(t => t.x >= functionalDividerX).map(t => t.text);

                    if (leftSide.length >= 2) {
                        matrixLines.push(leftSide.join(' '));
                    }
                    if (rightSide.length >= 1) {
                        sequenceLines.push(rightSide.join(' '));
                    }
                });

                // Strip consecutive duplicates caused by character ghosting reflections
                sequenceLines = sequenceLines.filter((item, index, arr) => index === 0 || item !== arr[index - 1]);

                // Render straight into the DOM elements
                matrixInput.value = matrixLines.join('\n');
                sequencesInput.value = sequenceLines.join('\n');
                
                if (matrixLines.length > 0) {
                    ocrStatus.innerText = "Matrix calibrated successfully! Verify and hit 'Calculate Optimal Breach Path'.";
                } else {
                    ocrStatus.innerText = "Warning: Matrix structure incomplete. Try capturing with your phone slightly closer.";
                }

            } catch (err) {
                ocrStatus.innerText = "Hardware Stack Error: " + err.message;
                console.error(err);
            }
        }

        // Backtracking Path Solver Core
        btnSolve.addEventListener('click', () => {
            const matrix = matrixInput.value.trim().toUpperCase().split('\n').map(line => line.split(/\s+/)).filter(l => l.length > 0 && l[0] !== "");
            const seqsInput = sequencesInput.value.trim().toUpperCase().split('\n');
            const sequences = seqsInput.map(line => line.split(/\s+/)).filter(s => s.length > 0 && s[0] !== "");
            const bufferSize = parseInt(document.getElementById('buffer-size').value);

            if (matrix.length === 0 || sequences.length === 0) {
                document.getElementById('solution-output').innerText = "Please input data inside both modules before requesting path generation.";
                return;
            }

            const res = solveCyberpunk(matrix, sequences, bufferSize);
            if (res && res.path.length > 0) {
                let html = `<p style="color:#fff">Sequences successfully completed: <span style="color:var(--cyber-blue)">${res.completedCount}/${sequences.length}</span></p>`;
                res.path.forEach((step, index) => {
                    html += `<div class="solution-line">[Step ${index+1}] Select "${step.value}" ➔ Row ${step.row + 1}, Col ${step.col + 1}</div>`;
                });
                document.getElementById('solution-output').innerHTML = html;
            } else {
                document.getElementById('solution-output').innerText = "Routing execution failed: Incompatible dataset or restricted buffer limits.";
            }
        });

        function solveCyberpunk(matrix, sequences, bufferSize) {
            let bestPath = [];
            let maxCompleted = -1;

            function search(row, col, isRowMove, currentBuffer, path, visited) {
                if (currentBuffer.length > bufferSize) return;
                let completed = 0;
                let bufferStr = currentBuffer.join(' ');
                sequences.forEach(seq => {
                    if (bufferStr.includes(seq.join(' '))) completed++;
                });

                if (completed > maxCompleted || (completed === maxCompleted && path.length < bestPath.length)) {
                    maxCompleted = completed;
                    bestPath = [...path];
                }
                if (currentBuffer.length === bufferSize) return;

                if (isRowMove) {
                    for (let c = 0; c < matrix[row].length; c++) {
                        let key = `${row}-${c}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row, col: c, value: matrix[row][c] });
                            currentBuffer.push(matrix[row][c]);
                            search(row, c, false, currentBuffer, path, visited);
                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                } else {
                    for (let r = 0; r < matrix.length; r++) {
                        let key = `${r}-${col}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row: r, col, value: matrix[r][col] });
                            currentBuffer.push(matrix[r][col]);
                            search(r, col, true, currentBuffer, path, visited);
                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                }
            }

            for (let c = 0; c < matrix[0].length; c++) {
                let visited = new Set([`0-${c}`]);
                search(0, c, false, [matrix[0][c]], [{ row: 0, col: c, value: matrix[0][c] }], visited);
            }
            return { path: bestPath, completedCount: maxCompleted };
        }
    </script>
</body>
</html>
