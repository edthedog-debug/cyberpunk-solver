<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITECH - Protocolo de Invasión</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --cyber-yellow: #dbde21;
            --cyber-blue: #3292b3;
            --cyber-dark: #070e14;
            --cyber-box: #13242c;
        }
        body {
            background-color: var(--cyber-dark);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-title {
            color: var(--cyber-yellow);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 5px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        /* Bloque de tiempo superior igual a la foto */
        .timer-block {
            border: 2px solid var(--cyber-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background: rgba(219, 222, 33, 0.05);
            margin-bottom: 15px;
        }
        .timer-title {
            color: var(--cyber-yellow);
            font-size: 16px;
            font-weight: bold;
        }
        .timer-value {
            border: 1px solid var(--cyber-yellow);
            padding: 2px 10px;
            color: var(--cyber-yellow);
            font-weight: bold;
        }

        /* Cámara integrada */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid var(--cyber-blue);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .camera-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px dashed rgba(0, 240, 255, 0.3);
            pointer-events: none;
            box-sizing: border-box;
        }

        /* Controles de escaneo */
        .btn {
            background-color: var(--cyber-yellow);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-upload {
            background-color: #1f3a47;
            color: var(--cyber-blue);
            border: 1px solid var(--cyber-blue);
        }
        .btn-solve {
            background-color: var(--cyber-blue);
            color: #fff;
            margin-top: 15px;
        }
        #ocr-status {
            font-size: 12px;
            color: var(--cyber-yellow);
            text-align: center;
            margin-bottom: 15px;
        }

        /* Grid de Datos igual a la imagen aportada */
        .game-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        @media(max-width: 480px) {
            .game-layout { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--cyber-box);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 10px;
        }
        .panel-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .matrix-title { color: var(--cyber-yellow); }
        .sequence-title { color: var(--cyber-blue); }

        textarea {
            width: 100%;
            background: #020608;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            box-sizing: border-box;
            padding: 8px;
            font-family: monospace;
            font-size: 15px;
            resize: vertical;
        }
        #matrix-input { height: 140px; letter-spacing: 3px; }
        #sequences-input { height: 140px; letter-spacing: 2px; }

        .buffer-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .buffer-section input {
            background: #000; color: #fff; border: 1px solid var(--cyber-blue);
            padding: 5px; width: 50px; text-align: center;
        }

        /* Resultados */
        #result {
            border: 1px solid var(--cyber-yellow);
            padding: 15px;
            background: rgba(219, 222, 33, 0.02);
            margin-top: 10px;
        }
        .solution-line {
            font-size: 16px;
            color: var(--cyber-yellow);
            margin: 8px 0;
        }
        /* Ocultar input nativo feo */
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="header-title">MILITECH COUPLER V7.4</div>
    
    <div class="container">
        <div class="timer-block">
            <div class="timer-title">TIEMPO RESTANTE DE LA INVASIÓN</div>
            <div class="timer-value">22.56</div>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="camera-overlay"></div>
        </div>
        
        <button class="btn" id="btn-capture">Escanear Pantalla Completa</button>
        
        <label for="file-input" class="btn btn-upload">Subir Foto desde Galería</label>
        <input type="file" id="file-input" accept="image/*">

        <div id="ocr-status">Cámara en vivo. Apunta de forma paralela a tu pantalla o sube una foto.</div>

        <div class="game-layout">
            <div class="panel">
                <div class="panel-title matrix-title">▰ MATRIZ DE CÓDIGO</div>
                <textarea id="matrix-input" placeholder="55 BD 1C BD E9 BD&#10;1C BD 55 55 1C 1C&#10;7A 1C 55 E9 BD 7A"></textarea>
            </div>
            <div class="panel">
                <div class="panel-title sequence-title">▰ SE NECESITA SECUENCIA</div>
                <textarea id="sequences-input" placeholder="1C 7A&#10;E9 55 BD&#10;BD 55 E9"></textarea>
            </div>
        </div>

        <div class="buffer-section">
            <span>TAMAÑO DEL BÚFER [BÚFER]:</span>
            <input type="number" id="buffer-size" value="5" min="4" max="8">
        </div>

        <button class="btn btn-solve" id="btn-solve">Calcular Ruta de Invasión Óptima</button>

        <div id="result">
            <div class="panel-title" style="color: var(--cyber-yellow)">Ruta de Hackeo Resultante:</div>
            <div id="solution-output">Esperando inicialización de datos...</div>
        </div>
    </div>

    <canvas id="hidden-canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const btnCapture = document.getElementById('btn-capture');
        const fileInput = document.getElementById('file-input');
        const btnSolve = document.getElementById('btn-solve');
        const ocrStatus = document.getElementById('ocr-status');
        const matrixInput = document.getElementById('matrix-input');
        const sequencesInput = document.getElementById('sequences-input');
        const hiddenCanvas = document.getElementById('hidden-canvas');

        // Inicializar cámara trasera ideal
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        }).then(stream => {
            video.srcObject = stream;
        }).catch(err => {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => video.srcObject = stream);
        });

        // 1. Capturar desde el flujo de la cámara activa
        btnCapture.addEventListener('click', () => {
            const ctx = hiddenCanvas.getContext('2d');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            
            procesarImagenOCR(hiddenCanvas.toDataURL('image/jpeg'));
        });

        // 2. Capturar leyendo una imagen subida (Archivo/Galería)
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            ocrStatus.innerText = "Cargando archivo de imagen...";
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const ctx = hiddenCanvas.getContext('2d');
                    hiddenCanvas.width = img.width;
                    hiddenCanvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    procesarImagenOCR(hiddenCanvas.toDataURL('image/jpeg'));
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Función del motor OCR Geométrico Integrado
        async function procesarImagenOCR(base64Image) {
            ocrStatus.innerText = "Analizando geometría de la pantalla... un momento.";
            try {
                const worker = await Tesseract.createWorker('eng');
                const { data } = await worker.recognize(base64Image);
                await worker.terminate();

                let tokens = [];
                data.words.forEach(word => {
                    let textClean = word.text.toUpperCase().replace(/[^A-Z0-9]/g, '');
                    if (['55', 'BD', '1C', '7A', 'E9'].includes(textClean)) {
                        tokens.push({
                            text: textClean,
                            x: word.bbox.x0,
                            y: word.bbox.y0
                        });
                    }
                });

                if (tokens.length === 0) {
                    ocrStatus.innerText = "No se detectaron códigos claros. Intenta acercar más la foto.";
                    return;
                }

                // Agrupar códigos por proximidad en el eje X para separar Matriz (Izquierda) de Secuencia (Derecha)
                let minX = Math.min(...tokens.map(t => t.x));
                let maxX = Math.max(...tokens.map(t => t.x));
                let midX = minX + (maxX - minX) * 0.60;

                let matrixTokens = tokens.filter(t => t.x < midX);
                let sequenceTokens = tokens.filter(t => t.x >= midX);

                // Reconstruir Matriz por filas (eje Y)
                matrixTokens.sort((a, b) => a.y - b.y);
                let matrixLines = [];
                let currentLine = [];
                let lastY = matrixTokens[0]?.y || 0;

                matrixTokens.forEach(t => {
                    if (Math.abs(t.y - lastY) > 25) {
                        if (currentLine.length > 0) {
                            currentLine.sort((a,b) => a.x - b.x);
                            matrixLines.push(currentLine.map(l => l.text).join(' '));
                        }
                        currentLine = [];
                    }
                    currentLine.push(t);
                    lastY = t.y;
                });
                if (currentLine.length > 0) {
                    currentLine.sort((a,b) => a.x - b.x);
                    matrixLines.push(currentLine.map(l => l.text).join(' '));
                }

                // Reconstruir Secuencias Requeridas
                sequenceTokens.sort((a, b) => a.y - b.y);
                let sequenceLines = [];
                let currentSeq = [];
                let lastSeqY = sequenceTokens[0]?.y || 0;

                sequenceTokens.forEach(t => {
                    if (Math.abs(t.y - lastSeqY) > 25) {
                        if (currentSeq.length > 0) {
                            currentSeq.sort((a,b) => a.x - b.x);
                            sequenceLines.push(currentSeq.map(s => s.text).join(' '));
                        }
                        currentSeq = [];
                    }
                    currentSeq.push(t);
                    lastSeqY = t.y;
                });
                if (currentSeq.length > 0) {
                    currentSeq.sort((a,b) => a.x - b.x);
                    sequenceLines.push(currentSeq.map(s => s.text).join(' '));
                }

                matrixInput.value = matrixLines.join('\n');
                sequencesInput.value = sequenceLines.join('\n');
                ocrStatus.innerText = "¡Escaneo exitoso! Verifica los datos capturados abajo.";

            } catch (err) {
                ocrStatus.innerText = "Error leyendo la imagen. Asegura buena iluminación.";
                console.error(err);
            }
        }

        // Algoritmo Solucionador del Protocolo de Invasión (Backtracking)
        btnSolve.addEventListener('click', () => {
            const matrix = matrixInput.value.trim().toUpperCase().split('\n').map(line => line.split(/\s+/)).filter(l => l.length > 0 && l[0] !== "");
            const seqsInput = sequencesInput.value.trim().toUpperCase().split('\n');
            const sequences = seqsInput.map(line => line.split(/\s+/)).filter(s => s.length > 0 && s[0] !== "");
            const bufferSize = parseInt(document.getElementById('buffer-size').value);

            if (matrix.length === 0 || sequences.length === 0) {
                document.getElementById('solution-output').innerText = "Debes rellenar o escanear la Matriz y la Secuencia.";
                return;
            }

            const res = solveCyberpunk(matrix, sequences, bufferSize);
            if (res && res.path.length > 0) {
                let html = `<p style="color:#fff">Secuencias desbloqueadas: <span style="color:var(--cyber-blue)">${res.completedCount}/${sequences.length}</span></p>`;
                res.path.forEach((step, index) => {
                    html += `<div class="solution-line">[Paso ${index+1}] Selecciona "${step.value}" ➔ Fila ${step.row + 1}, Columna ${step.col + 1}</div>`;
                });
                document.getElementById('solution-output').innerHTML = html;
            } else {
                document.getElementById('solution-output').innerText = "Búfer insuficiente o sin combinaciones posibles.";
            }
        });

        function solveCyberpunk(matrix, sequences, bufferSize) {
            let bestPath = [];
            let maxCompleted = -1;

            function search(row, col, isRowMove, currentBuffer, path, visited) {
                if (currentBuffer.length > bufferSize) return;
                let completed = 0;
                let bufferStr = currentBuffer.join(' ');
                sequences.forEach(seq => {
                    if (bufferStr.includes(seq.join(' '))) completed++;
                });

                if (completed > maxCompleted || (completed === maxCompleted && path.length < bestPath.length)) {
                    maxCompleted = completed;
                    bestPath = [...path];
                }
                if (currentBuffer.length === bufferSize) return;

                if (isRowMove) {
                    for (let c = 0; c < matrix[row].length; c++) {
                        let key = `${row}-${c}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row, col: c, value: matrix[row][c] });
                            currentBuffer.push(matrix[row][c]);
                            search(row, c, false, currentBuffer, path, visited);
                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                } else {
                    for (let r = 0; r < matrix.length; r++) {
                        let key = `${r}-${col}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row: r, col, value: matrix[r][col] });
                            currentBuffer.push(matrix[r][col]);
                            search(r, col, true, currentBuffer, path, visited);
                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                }
            }

            for (let c = 0; c < matrix[0].length; c++) {
                let visited = new Set([`0-${c}`]);
                search(0, c, false, [matrix[0][c]], [{ row: 0, col: c, value: matrix[0][c] }], visited);
            }
            return { path: bestPath, completedCount: maxCompleted };
        }
    </script>
</body>
</html>
