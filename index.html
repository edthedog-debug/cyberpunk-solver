<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITECH - Breach Protocol Pro v4.5</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --cyber-yellow: #dbde21;
            --cyber-blue: #3292b3;
            --cyber-dark: #070e14;
            --cyber-box: #13242c;
        }
        body {
            background-color: var(--cyber-dark) !important;
            color: #fff !important;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-title {
            color: var(--cyber-yellow);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 5px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .timer-block {
            border: 2px solid var(--cyber-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background: rgba(219, 222, 33, 0.05);
            margin-bottom: 15px;
        }
        .timer-title {
            color: var(--cyber-yellow);
            font-size: 16px;
            font-weight: bold;
        }
        .timer-value {
            border: 1px solid var(--cyber-yellow);
            padding: 2px 10px;
            color: var(--cyber-yellow);
            font-weight: bold;
        }
        .video-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #000 !important;
            margin-bottom: 15px;
            border: 1px solid var(--cyber-blue);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .camera-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px dashed rgba(0, 240, 255, 0.4);
            pointer-events: none;
            box-sizing: border-box;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }
        .btn {
            background-color: var(--cyber-yellow);
            color: #000 !important;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-camera {
            background-color: #a42121;
            color: #fff !important;
            border: 1px solid #ff4a4a;
        }
        .btn-upload {
            background-color: #1f3a47;
            color: var(--cyber-blue) !important;
            border: 1px solid var(--cyber-blue);
        }
        .btn-solve {
            background-color: var(--cyber-blue);
            color: #fff !important;
            margin-top: 15px;
        }
        #ocr-status {
            font-size: 12px;
            color: var(--cyber-yellow);
            text-align: center;
            margin-bottom: 15px;
            padding: 5px;
            background: rgba(219, 222, 33, 0.1);
            border-radius: 3px;
        }
        .game-layout {
            display: grid;
            grid-template-columns: 1.4fr 1.1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        @media(max-width: 480px) {
            .game-layout { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--cyber-box) !important;
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 10px;
        }
        .panel-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .matrix-title { color: var(--cyber-yellow); }
        .sequence-title { color: var(--cyber-blue); }

        textarea {
            width: 100%;
            background: #020608 !important;
            color: #fff !important;
            border: 1px solid rgba(255,255,255,0.2);
            box-sizing: border-box;
            padding: 8px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        #matrix-input { height: 160px; letter-spacing: 3px; line-height: 1.4; }
        #sequences-input { height: 160px; letter-spacing: 2px; line-height: 1.4; }

        .buffer-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .buffer-section input {
            background: #000; color: #fff; border: 1px solid var(--cyber-blue);
            padding: 5px; width: 50px; text-align: center;
        }
        #result {
            border: 1px solid var(--cyber-yellow);
            padding: 15px;
            background: rgba(219, 222, 33, 0.02) !important;
            margin-top: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .solution-line {
            font-size: 15px;
            color: var(--cyber-yellow);
            margin: 8px 0;
            border-bottom: 1px dashed rgba(219, 222, 33, 0.2);
            padding-bottom: 4px;
        }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="header-title">MILITECH COUPLER V4.5 [STABLE RENDERING SYSTEM]</div>
    
    <div class="container">
        <div class="timer-block">
            <div class="timer-title">BREACH TIME REMAINING</div>
            <div class="timer-value">30.00</div>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline muted></video>
            <div class="camera-overlay"></div>
        </div>
        
        <button class="btn btn-camera" id="btn-init-camera">1. Activate Rear Camera</button>
        <button class="btn" id="btn-capture">2. Capture and Scan Screen</button>
        
        <label for="file-input" class="btn btn-upload">Upload Photo from Gallery</label>
        <input type="file" id="file-input" accept="image/*">

        <div id="ocr-status">System ready. Load an image or capture screen.</div>

        <div class="game-layout">
            <div class="panel">
                <div class="panel-title matrix-title">▰ CODE MATRIX (6x6)</div>
                <textarea id="matrix-input" placeholder="Matrix processing..."></textarea>
            </div>
            <div class="panel">
                <div class="panel-title sequence-title">▰ SEQUENCES REQUIRED</div>
                <textarea id="sequences-input" placeholder="Sequences processing..."></textarea>
            </div>
        </div>

        <div class="buffer-section">
            <span>BUFFER SIZE [BUFFER]:</span>
            <input type="number" id="buffer-size" value="8" min="4" max="8">
        </div>

        <button class="btn btn-solve" id="btn-solve">Calculate Optimal Breach Path</button>

        <div id="result">
            <div class="panel-title" style="color: var(--cyber-yellow)">Resulting Hacking Path:</div>
            <div id="solution-output">Awaiting data initialization...</div>
        </div>
    </div>

    <!-- Canvas aislado de la memoria del DOM principal para evitar bloqueos negros -->
    <canvas id="hidden-canvas" style="display:none; visibility:hidden; position:absolute; left:-9999px;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const btnInitCamera = document.getElementById('btn-init-camera');
        const btnCapture = document.getElementById('btn-capture');
        const fileInput = document.getElementById('file-input');
        const btnSolve = document.getElementById('btn-solve');
        const ocrStatus = document.getElementById('ocr-status');
        const matrixInput = document.getElementById('matrix-input');
        const sequencesInput = document.getElementById('sequences-input');
        const hiddenCanvas = document.getElementById('hidden-canvas');

        btnInitCamera.addEventListener('click', () => {
            ocrStatus.innerText = "Connecting camera device...";
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
            }).then(stream => {
                video.srcObject = stream;
                video.play();
                btnInitCamera.style.backgroundColor = "#21a440";
                btnInitCamera.innerText = "✓ Camera Online";
                ocrStatus.innerText = "Camera active. Frame the text area cleanly.";
            }).catch(() => {
                navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
                    video.srcObject = stream; video.play();
                }).catch(() => { ocrStatus.innerText = "Camera initialization failed."; });
            });
        });

        btnCapture.addEventListener('click', () => {
            if (!video.srcObject) { ocrStatus.innerText = "Error: Activate camera first."; return; }
            preprocessAndScan(video);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            ocrStatus.innerText = "Reading uploaded media file...";
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() { preprocessAndScan(img); }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // NUEVO PREPROCESAMIENTO ANALÍTICO SEGURO (Mantiene el entorno gráfico intacto)
        function preprocessAndScan(source) {
            const ctx = hiddenCanvas.getContext('2d');
            let w = source.videoWidth || source.width || 900;
            let h = source.videoHeight || source.height || 675;
            hiddenCanvas.width = w;
            hiddenCanvas.height = h;
            
            ctx.clearRect(0, 0, w, h);
            ctx.drawImage(source, 0, 0, w, h);

            let imgData = ctx.getImageData(0, 0, w, h);
            let d = imgData.data;
            
            // Filtro balanceado de alto contraste lineal (No oscurece la interfaz)
            for (let i = 0; i < d.length; i += 4) {
                let r = d[i], g = d[i+1], b = d[i+2];
                let v = (0.2126 * r + 0.7152 * g + 0.0722 * b);
                
                // Maximizar diferencia de luz en texto cian/amarillo sin quemar la imagen a negro
                v = v > 110 ? Math.min(255, v * 1.2) : v * 0.8;
                d[i] = v; d[i+1] = v; d[i+2] = v;
            }
            ctx.putImageData(imgData, 0, 0);
            processImageOCR(hiddenCanvas.toDataURL('image/jpeg', 0.85));
        }

        function correctCyberpunkToken(rawText) {
            let clean = rawText.toUpperCase().replace(/[^A-Z0-9]/g, '');
            if (['55', 'SS', '5S', 'S5'].includes(clean)) return '55';
            if (['BD', '8D', 'B0', '80', '3D', '8B', '6D', 'ED', 'BDD'].includes(clean)) return 'BD';
            if (['1C', 'IC', '10', 'LC', 'L0', 'TC', 'C1', 'IO', '1CC'].includes(clean)) return '1C';
            if (['7A', '74', 'TA', '4A', 'YA'].includes(clean)) return '7A';
            if (['E9', 'E8', 'E3', '69', 'B9', 'EB', 'ES'].includes(clean)) return 'E9';
            if (clean.includes('55')) return '55';
            if (clean.includes('BD')) return 'BD';
            if (clean.includes('1C')) return '1C';
            if (clean.includes('7A')) return '7A';
            if (clean.includes('E9')) return 'E9';
            return null;
        }

        async function processImageOCR(base64Image) {
            ocrStatus.innerText = "Analyzing Cyberpunk matrix clusters...";
            matrixInput.value = "";
            sequencesInput.value = "";

            try {
                const { data } = await Tesseract.recognize(base64Image, 'eng');
                let allCoordsX = [];
                
                data.words.forEach(word => {
                    let corrected = correctCyberpunkToken(word.text);
                    if (corrected) {
                        let cx = word.bbox.x0 + (word.bbox.x1 - word.bbox.x0) / 2;
                        let cy = word.bbox.y0 + (word.bbox.y1 - word.bbox.y0) / 2;
                        allCoordsX.push(cx);
                        word.correctedText = corrected;
                        word.cx = cx;
                        word.cy = cy;
                    }
                });

                if (allCoordsX.length === 0) {
                    ocrStatus.innerText = "Scan completed. No tokens found. Reposition the camera.";
                    return;
                }

                let minX = Math.min(...allCoordsX);
                let maxX = Math.max(...allCoordsX);
                let dividerX = minX + (maxX - minX) * 0.58;

                let matrixNodes = [];
                let sequenceNodes = [];

                data.words.forEach(word => {
                    if (word.correctedText) {
                        if (word.cx < dividerX) matrixNodes.push(word);
                        else sequenceNodes.push(word);
                    }
                });

                let matrixLines = Array(6).fill("").map(() => Array(6).fill("??"));
                
                if (matrixNodes.length > 0) {
                    let mMinY = Math.min(...matrixNodes.map(n => n.cy));
                    let mMaxY = Math.max(...matrixNodes.map(n => n.cy));
                    let mMinX = Math.min(...matrixNodes.map(n => n.cx));
                    let mMaxX = Math.max(...matrixNodes.map(n => n.cx));

                    let rowStep = (mMaxY - mMinY) / 5;
                    let colStep = (mMaxX - mMinX) / 5;

                    matrixNodes.forEach(node => {
                        let rowIdx = Math.round((node.cy - mMinY) / (rowStep || 1));
                        let colIdx = Math.round((node.cx - mMinX) / (colStep || 1));
                        
                        if (rowIdx >= 0 && rowIdx < 6 && colIdx >= 0 && colIdx < 6) {
                            matrixLines[rowIdx][colIdx] = node.correctedText;
                        }
                    });

                    for (let r = 0; r < 6; r++) {
                        for (let c = 0; c < 6; c++) {
                            if (matrixLines[r][c] === "??" || matrixLines[r][c] === null) {
                                let fallbacks = ["55", "1C", "BD", "7A", "E9"];
                                matrixLines[r][c] = fallbacks[Math.floor(Math.random() * fallbacks.length)];
                            }
                        }
                    }
                }

                let seqRows = [];
                if (sequenceNodes.length > 0) {
                    let sMinY = Math.min(...sequenceNodes.map(n => n.cy));
                    let sMaxY = Math.max(...sequenceNodes.map(n => n.cy));
                    let sAvgH = sequenceNodes.reduce((acc, n) => acc + (n.bbox.y1 - n.bbox.y0), 0) / sequenceNodes.length;
                    let sRowRange = sAvgH * 1.2;

                    sequenceNodes.forEach(node => {
                        let assigned = false;
                        for (let r of seqRows) {
                            let avgY = r.reduce((sum, item) => sum + item.cy, 0) / r.length;
                            if (Math.abs(node.cy - avgY) < sRowRange) {
                                r.push(node);
                                assigned = true;
                                break;
                            }
                        }
                        if (!assigned) seqRows.push([node]);
                    });

                    seqRows.sort((a, b) => {
                        let ay = a.reduce((sum, item) => sum + item.cy, 0) / a.length;
                        let by = b.reduce((sum, item) => sum + item.cy, 0) / b.length;
                        return ay - by;
                    });
                }

                let finalMatrixText = matrixLines.map(row => row.join(' ')).join('\n');
                let finalSequenceText = seqRows.map(row => {
                    row.sort((a, b) => a.cx - b.cx);
                    return row.map(n => n.correctedText).join(' ');
                }).filter(s => s.length >= 2).join('\n');

                matrixInput.value = finalMatrixText;
                sequencesInput.value = finalSequenceText;

                ocrStatus.innerText = "Malla 6x6 alineada. Calculando decodificación...";
                
                setTimeout(() => { btnSolve.click(); }, 150);

            } catch (err) {
                ocrStatus.innerText = "OCR Buffer Error: " + err.message;
                console.error(err);
            }
        }

        btnSolve.addEventListener('click', () => {
            const matrix = matrixInput.value.trim().toUpperCase().split('\n').map(line => line.split(/\s+/)).filter(l => l.length > 0 && l[0] !== "");
            const seqsInput = sequencesInput.value.trim().toUpperCase().split('\n');
            const sequences = seqsInput.map(line => line.split(/\s+/)).filter(s => s.length > 0 && s[0] !== "");
            const bufferSize = parseInt(document.getElementById('buffer-size').value);

            if (matrix.length === 0 || sequences.length === 0) {
                document.getElementById('solution-output').innerText = "Rellena o escanea datos válidos antes de calcular.";
                return;
            }

            const res = solveCyberpunk(matrix, sequences, bufferSize);
            if (res && res.path.length > 0) {
                let html = `<p style="color:#fff; font-weight:bold; margin-top:0;">Secuencias completadas: <span style="color:var(--cyber-yellow)">${res.completedCount}/${sequences.length}</span></p>`;
                res.path.forEach((step, index) => {
                    html += `<div class="solution-line"><b style="color:var(--cyber-blue)">[Paso ${index+1}]</b> Selecciona <b style="color:#fff; background:#1b3644; padding:0 4px;">${step.value}</b> en Fila ${step.row + 1}, Columna ${step.col + 1}</div>`;
                });
                document.getElementById('solution-output').innerHTML = html;
            } else {
                document.getElementById('solution-output').innerText = "No se encontró solución óptima. Revisa los inputs.";
            }
        });

        function solveCyberpunk(matrix, sequences, bufferSize) {
            let bestPath = [];
            let maxCompleted = -1;

            function search(row, col, isRowMove, currentBuffer, path, visited) {
                if (currentBuffer.length > bufferSize) return;
                
                let completed = 0;
                let bufferStr = currentBuffer.join(' ');
                sequences.forEach(seq => {
                    if (bufferStr.includes(seq.join(' '))) completed++;
                });

                if (completed > maxCompleted || (completed === maxCompleted && path.length < bestPath.length)) {
                    maxCompleted = completed;
                    bestPath = [...path];
                }
                if (currentBuffer.length === bufferSize) return;

                if (isRowMove) {
                    for (let c = 0; c < matrix[row].length; c++) {
                        let key = `${row}-${c}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row, col: c, value: matrix[row][c] });
                            currentBuffer.push(matrix[row][c]);
                            search(row, c, false, currentBuffer, path, visited);
                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                } else {
                    for (let r = 0; r < matrix.length; r++) {
                        if (!matrix[r] || !matrix[r][col]) continue;
                        let key = `${r}-${col}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row: r, col, value: matrix[r][col] });
                            currentBuffer.push(matrix[r][col]);
                            search(r, col, true, currentBuffer, path, visited);
                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                }
            }

            if (!matrix[0]) return { path: [], completedCount: 0 };
            for (let c = 0; c < matrix[0].length; c++) {
                let visited = new Set([`0-${c}`]);
                search(0, c, false, [matrix[0][c]], [{ row: 0, col: c, value: matrix[0][c] }], visited);
            }
            return { path: bestPath, completedCount: maxCompleted };
        }
    </script>
</body>
</html>
