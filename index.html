<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITECH - Protocolo de Invasión Pro v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --cyber-yellow: #dbde21;
            --cyber-blue: #3292b3;
            --cyber-dark: #070e14;
            --cyber-box: #13242c;
        }
        body {
            background-color: var(--cyber-dark);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-title {
            color: var(--cyber-yellow);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 5px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }
        .timer-block {
            border: 2px solid var(--cyber-yellow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 15px;
            background: rgba(219, 222, 33, 0.05);
            margin-bottom: 15px;
        }
        .timer-title {
            color: var(--cyber-yellow);
            font-size: 16px;
            font-weight: bold;
        }
        .timer-value {
            border: 1px solid var(--cyber-yellow);
            padding: 2px 10px;
            color: var(--cyber-yellow);
            font-weight: bold;
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid var(--cyber-blue);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .camera-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 2px dashed rgba(0, 240, 255, 0.3);
            pointer-events: none;
            box-sizing: border-box;
        }
        .btn {
            background-color: var(--cyber-yellow);
            color: #000;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-upload {
            background-color: #1f3a47;
            color: var(--cyber-blue);
            border: 1px solid var(--cyber-blue);
        }
        .btn-solve {
            background-color: var(--cyber-blue);
            color: #fff;
            margin-top: 15px;
        }
        #ocr-status {
            font-size: 12px;
            color: var(--cyber-yellow);
            text-align: center;
            margin-bottom: 15px;
            padding: 5px;
            background: rgba(219, 222, 33, 0.1);
            border-radius: 3px;
        }
        .game-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        @media(max-width: 480px) {
            .game-layout { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--cyber-box);
            border: 1px solid rgba(0, 240, 255, 0.1);
            padding: 10px;
        }
        .panel-title {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .matrix-title { color: var(--cyber-yellow); }
        .sequence-title { color: var(--cyber-blue); }

        textarea {
            width: 100%;
            background: #020608;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            box-sizing: border-box;
            padding: 8px;
            font-family: monospace;
            font-size: 15px;
            resize: vertical;
        }
        #matrix-input { height: 140px; letter-spacing: 3px; }
        #sequences-input { height: 140px; letter-spacing: 2px; }

        .buffer-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .buffer-section input {
            background: #000; color: #fff; border: 1px solid var(--cyber-blue);
            padding: 5px; width: 50px; text-align: center;
        }
        #result {
            border: 1px solid var(--cyber-yellow);
            padding: 15px;
            background: rgba(219, 222, 33, 0.02);
            margin-top: 10px;
        }
        .solution-line {
            font-size: 16px;
            color: var(--cyber-yellow);
            margin: 8px 0;
        }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="header-title">MILITECH COUPLER V8.0 [AUTO-CALIBRATION MATRIX]</div>
    
    <div class="container">
        <div class="timer-block">
            <div class="timer-title">TIEMPO RESTANTE DE LA INVASIÓN</div>
            <div class="timer-value">30.00</div>
        </div>

        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="camera-overlay"></div>
        </div>
        
        <button class="btn" id="btn-capture">Escanear con Cámara en Vivo</button>
        
        <label for="file-input" class="btn btn-upload">Subir Foto desde Galería</label>
        <input type="file" id="file-input" accept="image/*">

        <div id="ocr-status">Sistema listo. Sube una foto o captura en vivo para procesar de forma automática.</div>

        <div class="game-layout">
            <div class="panel">
                <div class="panel-title matrix-title">▰ MATRIZ DE CÓDIGO</div>
                <textarea id="matrix-input" placeholder="Los datos aparecerán aquí..."></textarea>
            </div>
            <div class="panel">
                <div class="panel-title sequence-title">▰ SE NECESITA SECUENCIA</div>
                <textarea id="sequences-input" placeholder="Las secuencias aparecerán aquí..."></textarea>
            </div>
        </div>

        <div class="buffer-section">
            <span>TAMAÑO DEL BÚFER [BÚFER]:</span>
            <input type="number" id="buffer-size" value="7" min="4" max="8">
        </div>

        <button class="btn btn-solve" id="btn-solve">Calcular Ruta de Invasión Óptima</button>

        <div id="result">
            <div class="panel-title" style="color: var(--cyber-yellow)">Ruta de Hackeo Resultante:</div>
            <div id="solution-output">Esperando inicialización de datos...</div>
        </div>
    </div>

    <canvas id="hidden-canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const btnCapture = document.getElementById('btn-capture');
        const fileInput = document.getElementById('file-input');
        const btnSolve = document.getElementById('btn-solve');
        const ocrStatus = document.getElementById('ocr-status');
        const matrixInput = document.getElementById('matrix-input');
        const sequencesInput = document.getElementById('sequences-input');
        const hiddenCanvas = document.getElementById('hidden-canvas');

        // Inicializar cámara
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        }).then(stream => {
            video.srcObject = stream;
        }).catch(() => {
            navigator.mediaDevices.getUserMedia({ video: true }).then(stream => video.srcObject = stream);
        });

        // Eventos de entrada de imagen
        btnCapture.addEventListener('click', () => {
            const ctx = hiddenCanvas.getContext('2d');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
            procesarImagenOCR(hiddenCanvas.toDataURL('image/jpeg'));
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            ocrStatus.innerText = "Procesando archivo cargado...";
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const ctx = hiddenCanvas.getContext('2d');
                    hiddenCanvas.width = img.width;
                    hiddenCanvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    procesarImagenOCR(hiddenCanvas.toDataURL('image/jpeg'));
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Función inteligente para corregir fallas de lectura del OCR (Fuzzy Matching)
        function corregirTokenCyberpunk(rawText) {
            let clean = rawText.toUpperCase().replace(/[^A-Z0-9]/g, '');
            
            // Reemplazos de errores tipográficos comunes basados en tus capturas
            if (clean === '55' || clean === 'SS' || clean === '5S' || clean === 'S5') return '55';
            if (['BD', '8D', 'B0', '80', '3D', '8B', '6D', 'ED'].includes(clean)) return 'BD';
            if (['1C', 'IC', '10', 'LC', 'L0', 'TC', 'C1', 'IO'].includes(clean)) return '1C';
            if (['7A', '74', 'TA', '4A', 'YA', '74'].includes(clean)) return '7A';
            if (['E9', 'E8', 'E3', '69', 'B9', 'EB', 'ES', 'ED9', 'E99'].includes(clean)) return 'E9';
            
            // Si contiene alguna coincidencia parcial interna
            if (clean.includes('55')) return '55';
            if (clean.includes('BD')) return 'BD';
            if (clean.includes('1C')) return '1C';
            if (clean.includes('7A')) return '7A';
            if (clean.includes('E9')) return 'E9';

            return null; // Token no válido
        }

        // Motor OCR adaptable avanzado
        async function procesarImagenOCR(base64Image) {
            ocrStatus.innerText = "Ejecutando calibración y análisis de matriz...";
            try {
                const worker = await Tesseract.createWorker('eng');
                const { data } = await worker.recognize(base64Image);
                await worker.terminate();

                let tokens = [];
                let totalHeight = 0;

                data.words.forEach(word => {
                    let tokenCorregido = corregirTokenCyberpunk(word.text);
                    if (tokenCorregido) {
                        let cx = word.bbox.x0 + (word.bbox.x1 - word.bbox.x0) / 2;
                        let cy = word.bbox.y0 + (word.bbox.y1 - word.bbox.y0) / 2;
                        let h = word.bbox.y1 - word.bbox.y0;
                        tokens.push({ text: tokenCorregido, x: cx, y: cy, h: h, raw: word.text });
                        totalHeight += h;
                    }
                });

                if (tokens.length === 0) {
                    ocrStatus.innerText = "No se detectaron códigos legibles. Asegúrate de encuadrar bien la pantalla.";
                    return;
                }

                // Altura promedio de un token para saber el rango dinámico de una fila
                let avgH = totalHeight / tokens.length;
                let rangoFila = avgH * 0.85; // Umbral adaptable basado en la escala real de la imagen

                // 1. Agrupar de forma elástica en filas (resiste inclinaciones de perspectiva)
                let filasAgrupadas = [];
                tokens.forEach(t => {
                    let asignado = false;
                    for (let fila of filasAgrupadas) {
                        let avgYFila = fila.reduce((sum, item) => sum + item.y, 0) / fila.length;
                        if (Math.abs(t.y - avgYFila) < rangoFila) {
                            fila.push(t);
                            asignado = true;
                            break;
                        }
                    }
                    if (!asignado) {
                        filasAgrupadas.push([t]);
                    }
                });

                // Ordenar las filas de arriba a abajo
                filasAgrupadas.sort((a, b) => {
                    let ay = a.reduce((sum, item) => sum + item.y, 0) / a.length;
                    let by = b.reduce((sum, item) => sum + item.y, 0) / b.length;
                    return ay - by;
                });

                let matrizLineas = [];
                let secuenciaLineas = [];

                // 2. Separar dinámicamente Matriz (Izquierda) y Secuencia (Derecha) analizando el espacio vacío central
                filasAgrupadas.forEach(fila => {
                    // Ordenar elementos de la fila horizontalmente (de izquierda a derecha)
                    fila.sort((a, b) => a.x - b.x);
                    
                    if (fila.length < 2) return;

                    // Encontrar el salto o distancia horizontal más grande (Gap) en la fila actual
                    let maxGap = 0;
                    let gapIndex = -1;
                    for (let i = 0; i < fila.length - 1; i++) {
                        let gap = fila[i+1].x - fila[i].x;
                        if (gap > maxGap) {
                            maxGap = gap;
                            gapIndex = i;
                        }
                    }

                    // Si el espacio en blanco es considerable, dividimos de forma limpia
                    if (gapIndex !== -1 && maxGap > avgH * 2.5) {
                        let parteIzquierda = fila.slice(0, gapIndex + 1).map(t => t.text);
                        let parteDerecha = fila.slice(gapIndex + 1).map(t => t.text);

                        if (parteIzquierda.length >= 4) { // Es una línea de la matriz válida
                            matrizLineas.push(parteIzquierda.join(' '));
                        }
                        if (parteDerecha.length >= 2) { // Es una secuencia válida
                            secuenciaLineas.push(parteDerecha.join(' '));
                        }
                    } else {
                        // Si no hay corte claro pero tiene muchos elementos, asumimos que es fila completa de matriz
                        if (fila.length >= 5) {
                            matrizLineas.push(fila.map(t => t.text).join(' '));
                        }
                    }
                });

                // Limpieza de duplicados de secuencias idénticas adyacentes causados por el OCR
                secuenciaLineas = secuenciaLineas.filter((item, index, arr) => index === 0 || item !== arr[index - 1]);

                // Volcar resultados en la interfaz web de inmediato
                matrixInput.value = matrizLineas.join('\n');
                sequencesInput.value = secuenciaLineas.join('\n');
                ocrStatus.innerText = "¡Calibración exitosa! Revisa los campos y pulsa 'Calcular Ruta'.";

            } catch (err) {
                ocrStatus.innerText = "Error procesando. Comprueba los permisos de tu navegador.";
                console.error(err);
            }
        }

        // Algoritmo Solucionador del Protocolo de Invasión (Backtracking Exacto)
        btnSolve.addEventListener('click', () => {
            const matrix = matrixInput.value.trim().toUpperCase().split('\n').map(line => line.split(/\s+/)).filter(l => l.length > 0 && l[0] !== "");
            const seqsInput = sequencesInput.value.trim().toUpperCase().split('\n');
            const sequences = seqsInput.map(line => line.split(/\s+/)).filter(s => s.length > 0 && s[0] !== "");
            const bufferSize = parseInt(document.getElementById('buffer-size').value);

            if (matrix.length === 0 || sequences.length === 0) {
                document.getElementById('solution-output').innerText = "Rellena o escanea datos válidos antes de calcular.";
                return;
            }

            const res = solveCyberpunk(matrix, sequences, bufferSize);
            if (res && res.path.length > 0) {
                let html = `<p style="color:#fff">Secuencias completadas con éxito: <span style="color:var(--cyber-blue)">${res.completedCount}/${sequences.length}</span></p>`;
                res.path.forEach((step, index) => {
                    html += `<div class="solution-line">[Paso ${index+1}] Selecciona "${step.value}" ➔ Fila ${step.row + 1}, Columna ${step.col + 1}</div>`;
                });
                document.getElementById('solution-output').innerHTML = html;
            } else {
                document.getElementById('solution-output').innerText = "Imposible resolver. Revisa si el búfer es muy pequeño.";
            }
        });

        function solveCyberpunk(matrix, sequences, bufferSize) {
            let bestPath = [];
            let maxCompleted = -1;

            function search(row, col, isRowMove, currentBuffer, path, visited) {
                if (currentBuffer.length > bufferSize) return;
                let completed = 0;
                let bufferStr = currentBuffer.join(' ');
                sequences.forEach(seq => {
                    if (bufferStr.includes(seq.join(' '))) completed++;
                });

                if (completed > maxCompleted || (completed === maxCompleted && path.length < bestPath.length)) {
                    maxCompleted = completed;
                    bestPath = [...path];
                }
                if (currentBuffer.length === bufferSize) return;

                if (isRowMove) {
                    for (let c = 0; c < matrix[row].length; c++) {
                        let key = `${row}-${c}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row, col: c, value: matrix[row][c] });
                            currentBuffer.push(matrix[row][c]);
                            search(row, c, false, currentBuffer, path, visited);
                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                } else {
                    for (let r = 0; r < matrix.length; r++) {
                        let key = `${r}-${col}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row: r, col, value: matrix[r][col] });
                            currentBuffer.push(matrix[r][col]);
                            search(r, col, true, currentBuffer, path, visited);
                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                }
            }

            for (let c = 0; c < matrix[0].length; c++) {
                let visited = new Set([`0-${c}`]);
                search(0, c, false, [matrix[0][c]], [{ row: 0, col: c, value: matrix[0][c] }], visited);
            }
            return { path: bestPath, completedCount: maxCompleted };
        }
    </script>
</body>
</html>
