<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netrunner Breach Protocol Solver</title>
    <!-- Tesseract.js CDN for Client-Side OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --cyber-yellow: #fcee0a;
            --cyber-blue: #00f0ff;
            --cyber-dark: #030712;
            --cyber-bg: #0b0f19;
            --cyber-pink: #ff0055;
            --cyber-gray: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--cyber-bg);
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            border: 4px solid var(--cyber-yellow);
            position: relative;
        }

        body::before {
            content: ":: BREACH_PROTOCOL_v4.72 ::";
            position: absolute;
            top: 5px;
            left: 10px;
            color: var(--cyber-yellow);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        h1 {
            color: var(--cyber-yellow);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(252, 238, 10, 0.5);
            margin: 20px 0;
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 3px;
            border-bottom: 2px solid var(--cyber-blue);
            padding-bottom: 10px;
            width: 100%;
            max-width: 600px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(3, 7, 18, 0.85);
            border: 1px solid var(--cyber-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-title {
            color: var(--cyber-blue);
            font-size: 1.1rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Camera & Scan UI */
        .camera-box {
            position: relative;
            width: 100%;
            background: #000;
            border: 2px dashed var(--cyber-pink);
            aspect-ratio: 4/3;
            overflow: hidden;
            margin-bottom: 15px;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-overlay {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 80%;
            border: 2px solid var(--cyber-yellow);
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .scan-overlay::before {
            content: "ALINEAR MATRIZ AQUÍ";
            position: absolute;
            top: -25px;
            left: 0;
            background: var(--cyber-yellow);
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 6px;
        }

        .btn {
            background: var(--cyber-yellow);
            color: #000;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 3px 3px 0px var(--cyber-blue);
            margin-bottom: 10px;
        }

        .btn:hover {
            background: var(--cyber-blue);
            color: #000;
            box-shadow: 3px 3px 0px var(--cyber-pink);
        }

        .btn-secondary {
            background: transparent;
            color: var(--cyber-blue);
            border: 1px solid var(--cyber-blue);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: rgba(0, 240, 255, 0.1);
            color: var(--cyber-blue);
            box-shadow: none;
        }

        /* Editor inputs */
        .grid-inputs {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--cyber-blue);
            margin-bottom: 5px;
        }

        textarea, input {
            width: 100%;
            background: var(--cyber-gray);
            border: 1px solid var(--cyber-blue);
            color: #fff;
            padding: 10px;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        /* Results / Solution display */
        .solution-output {
            background: rgba(255, 0, 85, 0.1);
            border-left: 4px solid var(--cyber-pink);
            padding: 15px;
            margin-top: 15px;
            display: none;
        }

        .solution-step {
            display: inline-block;
            background: var(--cyber-blue);
            color: #000;
            padding: 5px 10px;
            margin: 5px;
            font-weight: bold;
            border-radius: 2px;
        }

        .matrix-preview-table {
            border-collapse: collapse;
            margin-top: 10px;
            width: 100%;
            text-align: center;
        }
        .matrix-preview-table td {
            border: 1px solid #334155;
            padding: 8px;
            font-size: 1.2rem;
        }
        .matrix-preview-table td.highlighted {
            background: var(--cyber-yellow);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 8px var(--cyber-yellow);
        }

        #status-log {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 5px;
            font-style: italic;
        }

        .flex-row {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>

    <h1>Icebreaker Protocol</h1>

    <!-- SECTION 1: SCANNER & INPUT -->
    <div class="container">
        <div class="section-title">
            <span>[01] Captura Óptica (Cámara)</span>
            <span style="color: var(--cyber-pink);" id="ocr-engine-status">Tesseract Listo</span>
        </div>
        
        <div class="camera-box" id="camera-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="scan-overlay"></div>
        </div>

        <button class="btn" id="btn-snap">Escanear Matriz e Invasiones</button>
        <button class="btn btn-secondary" id="btn-toggle-cam">Cambiar Cámara</button>
        <div id="status-log">Inicia la cámara para leer automáticamente la pantalla.</div>
    </div>

    <!-- SECTION 2: EDIT / VERIFY DATA -->
    <div class="container">
        <div class="section-title">[02] Datos de la Matriz (Editar / Copiar)</div>
        <div class="grid-inputs">
            <div>
                <label for="buffer-size">Tamaño de Búfer (Buffer Capacity):</label>
                <input type="number" id="buffer-size" value="7" min="4" max="12">
            </div>
            <div>
                <label for="matrix-input">Matriz de Código (Filas separadas por saltos de línea):</label>
                <textarea id="matrix-input" placeholder="55 1C 1C 55 7A 7A&#10;1C 1C 55 1C 1C 1C&#10;7A 1C BD 1C BD 1C"></textarea>
            </div>
            <div>
                <label for="daemons-input">Secuencias Requeridas / Invasiones (Una por línea):</label>
                <textarea id="daemons-input" placeholder="1C 1C&#10;1C 1C BD&#10;1C 1C 1C"></textarea>
            </div>
            <button class="btn" style="background-color: var(--cyber-blue); box-shadow: 3px 3px 0px var(--cyber-yellow);" id="btn-solve">Calcular Ruta Óptima</button>
        </div>
    </div>

    <!-- SECTION 3: RESOLUTION -->
    <div class="container">
        <div class="section-title">[03] Matriz Resultante y Ruta</div>
        
        <div id="matrix-visual-container"></div>

        <div class="solution-output" id="solution-box">
            <h3 style="color: var(--cyber-pink); margin-bottom: 10px; font-size: 1.1rem;">RUTA DE ENTRADA ENCONTRADA:</h3>
            <div id="steps-container"></div>
            <p id="daemons-completed" style="margin-top: 10px; font-size: 0.9rem; color: var(--cyber-blue);"></p>
        </div>
    </div>

    <!-- Hidden Canvas used for grabbing frames -->
    <canvas id="capture-canvas" style="display:none;"></canvas>

    <script>
        // Set exact values passed by user as sample fallback data immediately
        document.getElementById('matrix-input').value = `55 1C 1C 55 7A 7A
1C 1C 55 1C 1C 1C
7A 1C BD 1C BD 1C
E9 1C 1C E9 7A 55
7A E9 1C 1C 1C 1C
E9 7A 7A 1C E9 E9`;

        document.getElementById('daemons-input').value = `1C 1C
1C 1C BD
1C 1C 1C`;

        const video = document.getElementById('webcam');
        const btnSnap = document.getElementById('btn-snap');
        const btnToggleCam = document.getElementById('btn-toggle-cam');
        const btnSolve = document.getElementById('btn-solve');
        const statusLog = document.getElementById('status-log');
        const ocrStatus = document.getElementById('ocr-engine-status');
        
        let currentStream = null;
        let useFacingMode = "environment"; // default to rear camera on mobile

        // Initialize Camera Stream
        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }
            try {
                const constraints = {
                    video: { facingMode: useFacingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: false
                };
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
                statusLog.innerText = "Cámara iniciada. Enfoca la pantalla del juego.";
            } catch (err) {
                console.error(err);
                statusLog.innerText = "Error accediendo a la cámara: " + err.message;
            }
        }

        btnToggleCam.addEventListener('click', () => {
            useFacingMode = useFacingMode === "environment" ? "user" : "environment";
            startCamera();
        });

        // OCR Handler using Tesseract.js
        btnSnap.addEventListener('click', async () => {
            if (!video.srcObject) {
                statusLog.innerText = "La cámara no está activa.";
                return;
            }
            
            ocrStatus.innerText = "PROCESANDO IMAGEN...";
            statusLog.innerText = "Tomando captura de cuadro y ejecutando OCR...";

            const canvas = document.getElementById('capture-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            try {
                // Perform client side text extraction
                const worker = await Tesseract.createWorker('es');
                const result = await worker.recognize(canvas);
                const text = result.data.text;
                await worker.terminate();

                ocrStatus.innerText = "Tesseract Listo";
                statusLog.innerText = "OCR Finalizado. Analizando cadenas de texto...";
                
                parseOCRText(text);
            } catch (error) {
                console.error(error);
                ocrStatus.innerText = "Error OCR";
                statusLog.innerText = "Error al reconocer texto: " + error.message;
            }
        });

        // Simple Regex Parser to discover Hex pairs (1C, 55, 7A, BD, E9)
        function parseOCRText(text) {
            const validTokens = ["55", "1C", "7A", "BD", "E9"];
            const lines = text.toUpperCase().split('\n');
            
            let matrixLines = [];
            let foundDaemons = [];

            lines.forEach(line => {
                // Match hex-like pairs
                const tokens = line.match(/[0-9A-Z]{2}/g);
                if (tokens) {
                    const cleanTokens = tokens.filter(t => validTokens.includes(t));
                    if (cleanTokens.length >= 4) {
                        matrixLines.push(cleanTokens.join(" "));
                    } else if (cleanTokens.length >= 2) {
                        foundDaemons.push(cleanTokens.join(" "));
                    }
                }
            });

            if (matrixLines.length > 0) {
                document.getElementById('matrix-input').value = matrixLines.join('\n');
            }
            if (foundDaemons.length > 0) {
                document.getElementById('daemons-input').value = foundDaemons.join('\n');
            }
            
            statusLog.innerText = "Datos cargados desde OCR. Por favor verifica si son exactos antes de resolver.";
            // Auto trigger solve
            solveBreach();
        }

        // BREACH PROTOCOL ALGORITHM SOLVER
        btnSolve.addEventListener('click', solveBreach);

        function solveBreach() {
            const matrixRaw = document.getElementById('matrix-input').value.trim().toUpperCase();
            const daemonsRaw = document.getElementById('daemons-input').value.trim().toUpperCase();
            const bufferSize = parseInt(document.getElementById('buffer-size').value) || 7;

            if (!matrixRaw || !daemonsRaw) {
                alert("Por favor ingresa la matriz y las secuencias.");
                return;
            }

            // Transform raw strings to structured matrices
            const matrix = matrixRaw.split('\n').map(line => line.trim().split(/\s+/));
            const daemons = daemonsRaw.split('\n').map(line => line.trim().split(/\s+/));

            const rows = matrix.length;
            const cols = matrix[0].length;

            let bestSequence = [];
            let bestScore = -1;
            let bestPath = []; // coordinates array of {r, c}

            // Recursive function to test paths (DFS Backtracking)
            function findPaths(r, c, isRow, currentPath, currentSeq) {
                if (currentSeq.length > bufferSize) return;

                // Evaluate performance of sequence
                let score = 0;
                let completedCount = 0;
                
                daemons.forEach((daemon, idx) => {
                    // Check if daemon sequence is a subarray of currentSeq
                    if (isSubarray(currentSeq, daemon)) {
                        // Higher index or longer length yields higher score weight
                        score += (idx + 1) * 10 + daemon.length;
                        completedCount++;
                    }
                });

                if (score > bestScore || (score === bestScore && currentSeq.length < bestSequence.length)) {
                    bestScore = score;
                    bestSequence = [...currentSeq];
                    bestPath = [...currentPath];
                }

                if (currentSeq.length === bufferSize) return;

                if (isRow) {
                    // Navigate across the column positions inside the fixed row 'r'
                    for (let nextC = 0; nextC < cols; nextC++) {
                        if (!currentPath.some(p => p.r === r && p.c === nextC)) {
                            currentPath.push({r: r, c: nextC});
                            currentSeq.push(matrix[r][nextC]);
                            
                            findPaths(r, nextC, false, currentPath, currentSeq);
                            
                            currentSeq.pop();
                            currentPath.pop();
                        }
                    }
                } else {
                    // Navigate across row positions inside the fixed column 'c'
                    for (let nextR = 0; nextR < rows; nextR++) {
                        if (!currentPath.some(p => p.r === nextR && p.c === c)) {
                            currentPath.push({r: nextR, c: c});
                            currentSeq.push(matrix[nextR][c]);
                            
                            findPaths(nextR, c, true, currentPath, currentSeq);
                            
                            currentSeq.pop();
                            currentPath.pop();
                        }
                    }
                }
            }

            // Start search from top row (r=0), checking every column position
            for (let c = 0; c < cols; c++) {
                findPaths(0, c, false, [{r: 0, c: c}], [matrix[0][c]]);
            }

            // Render output visuals
            renderSolution(matrix, bestPath, bestSequence, daemons);
        }

        function isSubarray(master, sub) {
            if (sub.length === 0) return false;
            for (let i = 0; i <= master.length - sub.length; i++) {
                let match = true;
                for (let j = 0; j < sub.length; j++) {
                    if (master[i + j] !== sub[j]) {
                        match = false;
                        break;
                    }
                }
                if (match) return true;
            }
            return false;
        }

        function renderSolution(matrix, path, sequence, daemons) {
            const visualContainer = document.getElementById('matrix-visual-container');
            visualContainer.innerHTML = "";

            // Render interactive matrix layout
            const table = document.createElement('table');
            table.className = "matrix-preview-table";

            matrix.forEach((row, r) => {
                const tr = document.createElement('tr');
                row.forEach((cell, c) => {
                    const td = document.createElement('td');
                    td.innerText = cell;
                    
                    // Highlight if it belongs to selected path sequence order
                    const stepIndex = path.findIndex(p => p.r === r && p.c === c);
                    if (stepIndex !== -1) {
                        td.className = "highlighted";
                        td.innerHTML = `${cell}<br><span style="font-size:9px;color:#f00;">[${stepIndex + 1}]</span>`;
                    }
                    tr.appendChild(td);
                });
                table.appendChild(tr);
            });
            visualContainer.appendChild(table);

            // Print step-by-step route directions
            const stepsContainer = document.getElementById('steps-container');
            stepsContainer.innerHTML = "";
            
            path.forEach((node, idx) => {
                const span = document.createElement('span');
                span.className = "solution-step";
                span.innerText = `${matrix[node.r][node.col || node.c]} (Fila ${node.r + 1}, Col ${node.c + 1})`;
                stepsContainer.appendChild(span);
            });

            // Display completed targets
            let completedDaemons = [];
            daemons.forEach(d => {
                if (isSubarray(sequence, d)) {
                    completedDaemons.push(d.join(" "));
                }
            });

            document.getElementById('daemons-completed').innerText = "Secuencias vulneradas exitosamente: " + 
                (completedDaemons.length > 0 ? completedDaemons.join(" | ") : "Ninguna (Ajusta el buffer)");

            document.getElementById('solution-box').style.display = "block";
        }

        // Start streaming instantly on load
        window.addEventListener('DOMContentLoaded', startCamera);
    </script>
</body>
</html>
