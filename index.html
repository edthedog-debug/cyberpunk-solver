<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk 2077 - Decodificador de Invasión</title>
    <style>
        :root {
            --cyber-yellow: #fcee0a;
            --cyber-blue: #00f0ff;
            --cyber-dark: #030303;
            --cyber-gray: #1a1a1a;
        }
        body {
            background-color: var(--cyber-dark);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1, h2 {
            color: var(--cyber-yellow);
            text-transform: uppercase;
            text-shadow: 0 0 5px var(--cyber-yellow);
            margin: 5px 0;
        }
        .container {
            width: 100%;
            max-width: 500px;
            border: 2px solid var(--cyber-yellow);
            padding: 10px;
            background: var(--cyber-gray);
            box-shadow: 0 0 15px rgba(252, 238, 10, 0.2);
        }
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            margin-bottom: 10px;
            border: 1px solid var(--cyber-blue);
        }
        video {
            width: 100%;
            height: auto;
            display: block;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px dashed var(--cyber-blue);
            width: 80%;
            height: 60%;
            pointer-events: none;
        }
        button {
            background-color: var(--cyber-yellow);
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        button:active {
            background-color: var(--cyber-blue);
        }
        textarea {
            width: 100%;
            height: 80px;
            background: #000;
            color: var(--cyber-blue);
            border: 1px solid var(--cyber-blue);
            box-sizing: border-box;
            padding: 5px;
            font-size: 14px;
            margin-bottom: 10px;
            resize: none;
        }
        .section-title {
            font-size: 12px;
            color: var(--cyber-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        #result {
            margin-top: 15px;
            padding: 10px;
            border: 1px dashed var(--cyber-yellow);
            background: rgba(252, 238, 10, 0.05);
        }
        .step-path {
            color: var(--cyber-yellow);
            font-weight: bold;
            font-size: 18px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
</head>
<body>

    <h1>Protocolo de Invasión</h1>
    <div class="container">
        
        <div class="section-title">Escáner de Cámara (Apunta a la Matriz)</div>
        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="overlay"></div>
        </div>
        
        <button id="btn-capture">Escanear Matriz con OCR</button>
        <div id="ocr-status" style="font-size: 12px; color: var(--cyber-yellow); margin-bottom: 10px;">Cámara lista.</div>

        <div class="section-title">Matriz de Código (Línea por línea)</div>
        <textarea id="matrix-input" placeholder="Ejemplo:&#10;55 BD 1C BD E9 BD&#10;1C BD 55 55 1C 1C&#10;7A 1C 55 E9 BD 7A"></textarea>

        <div class="section-title">Secuencias Requeridas (Una por línea)</div>
        <textarea id="sequences-input" placeholder="Ejemplo:&#10;1C 7A&#10;E9 55 BD&#10;BD 55 E9"></textarea>
        
        <div class="section-title">Tamaño del Búfer</div>
        <input type="number" id="buffer-size" value="5" min="4" max="8" style="background:#000; color:#fff; border:1px solid var(--cyber-blue); padding:5px; width:50px; margin-bottom:15px;">

        <button id="btn-solve" style="background-color: var(--cyber-blue);">Resolver Secuencia Óptima</button>

        <div id="result">
            <div class="section-title">Solución Óptima:</div>
            <div id="solution-output">Ingresa los datos o usa la cámara y presiona Resolver.</div>
        </div>
    </div>

    <canvas id="hidden-canvas" style="display: none;"></canvas>

    <script>
        const video = document.getElementById('webcam');
        const btnCapture = document.getElementById('btn-capture');
        const btnSolve = document.getElementById('btn-solve');
        const ocrStatus = document.getElementById('ocr-status');
        const matrixInput = document.getElementById('matrix-input');
        const hiddenCanvas = document.getElementById('hidden-canvas');

        // 1. Activar la cámara trasera del móvil
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" } } // Forza la cámara trasera
        }).then(stream => {
            video.srcObject = stream;
        }).catch(err => {
            console.log("Cámara trasera no encontrada, usando cámara por defecto...", err);
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => video.srcObject = stream);
        });

        // 2. Procesamiento de OCR al capturar
        btnCapture.addEventListener('click', () => {
            ocrStatus.innerText = "Procesando imagen (OCR)... por favor espera.";
            
            // Dibujar el frame actual del video en el canvas oculto
            const ctx = hiddenCanvas.getContext('2d');
            hiddenCanvas.width = video.videoWidth;
            hiddenCanvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);

            // Ejecutar Tesseract OCR en la imagen capturada
            Tesseract.recognize(
                hiddenCanvas.toDataURL('image/jpeg'),
                'eng', // El juego usa caracteres alfanuméricos (1C, 55, BD, 7A, E9) comunes en inglés
                { logger: m => console.log(m) }
            ).then(({ data: { text } }) => {
                ocrStatus.innerText = "¡Lectura completada! Revisa y corrige si es necesario.";
                
                // Filtrar el texto para intentar extraer los valores hexadecimales limpios (pares de caracteres)
                let lines = text.toUpperCase().split('\n');
                let cleanLines = lines.map(line => {
                    // Extrae tokens válidos del minijuego (55, BD, 1C, 7A, E9, E9, etc.)
                    let matches = line.match(/(55|BD|1C|7A|E9)/g);
                    return matches ? matches.join(' ') : '';
                }).filter(line => line.length > 0);

                matrixInput.value = cleanLines.join('\n');
            }).catch(err => {
                ocrStatus.innerText = "Error en el reconocimiento de imagen.";
                console.error(err);
            });
        });

        // 3. Algoritmo Solucionador del Protocolo de Invasión
        btnSolve.addEventListener('click', () => {
            // Parsear matriz
            const matrix = matrixInput.value.trim().toUpperCase().split('\n').map(line => line.split(/\s+/));
            // Parsear secuencias
            const sequencesInput = document.getElementById('sequences-input').value.trim().toUpperCase().split('\n');
            const sequences = sequencesInput.map(line => line.split(/\s+/)).filter(s => s.length > 0 && s[0] !== "");
            // Tamaño del búfer
            const bufferSize = parseInt(document.getElementById('buffer-size').value);

            if (!matrix || matrix[0].length === 0 || sequences.length === 0) {
                document.getElementById('solution-output').innerText = "Por favor, introduce la matriz y las secuencias.";
                return;
            }

            const solution = solveCyberpunk(matrix, sequences, bufferSize);
            
            if (solution && solution.path.length > 0) {
                let htmlResult = `<p>Secuencias completadas: <strong>${solution.completedCount} de ${sequences.length}</strong></p>`;
                htmlResult += `<p class="step-path">Ruta a seguir:</p><ol>`;
                solution.path.forEach(step => {
                    htmlResult += `<li>Selecciona <strong>${step.value}</strong> en la posición [Fila ${step.row + 1}, Col ${step.col + 1}]</li>`;
                });
                htmlResult += `</ol>`;
                document.getElementById('solution-output').innerHTML = htmlResult;
            } else {
                document.getElementById('solution-output').innerText = "No se encontró una solución válida para el tamaño del búfer dado.";
            }
        });

        // Función de Backtracking para resolver el puzzle
        function solveCyberpunk(matrix, sequences, bufferSize) {
            let bestPath = [];
            let maxCompleted = -1;

            function search(row, col, isRowMove, currentBuffer, path, visited) {
                if (currentBuffer.length > bufferSize) return;

                // Evaluar cuántas secuencias se han completado con el búfer actual
                let completed = 0;
                let bufferStr = currentBuffer.join(' ');
                sequences.forEach(seq => {
                    if (bufferStr.includes(seq.join(' '))) {
                        completed++;
                    }
                });

                if (completed > maxCompleted || (completed === maxCompleted && path.length < bestPath.length)) {
                    maxCompleted = completed;
                    bestPath = [...path];
                }

                if (currentBuffer.length === bufferSize) return;

                if (isRowMove) {
                    // Moverse horizontalmente en la fila actual
                    for (let c = 0; c < matrix[row].length; c++) {
                        let key = `${row}-${c}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row, col: c, value: matrix[row][c] });
                            currentBuffer.push(matrix[row][c]);

                            search(row, c, false, currentBuffer, path, visited);

                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                } else {
                    // Moverse verticalmente en la columna actual
                    for (let r = 0; r < matrix.length; r++) {
                        let key = `${r}-${col}`;
                        if (!visited.has(key)) {
                            visited.add(key);
                            path.push({ row: r, col, value: matrix[r][col] });
                            currentBuffer.push(matrix[r][col]);

                            search(r, col, true, currentBuffer, path, visited);

                            currentBuffer.pop();
                            path.pop();
                            visited.delete(key);
                        }
                    }
                }
            }

            // El juego siempre empieza en la Fila 0 de manera Horizontal (isRowMove = true)
            for (let c = 0; c < matrix[0].length; c++) {
                let visited = new Set([`0-${c}`]);
                search(0, c, false, [matrix[0][c]], [{ row: 0, col: c, value: matrix[0][c] }], visited);
            }

            return { path: bestPath, completedCount: maxCompleted };
        }
    </script>
</body>
</html>
